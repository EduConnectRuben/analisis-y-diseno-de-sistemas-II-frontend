<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PD8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <h1>Sistema de Gestión PD8</h1>

    <!-- Sección de Acceso -->
    <div id="auth-container" class="grid-container">
        <div class="card">
            <h2>Ingresar</h2>
            <input id="login_email" placeholder="Email">
            <input id="login_password" type="password" placeholder="Password">
            <button onclick="login()">Entrar</button>
        </div>

        <div class="card">
            <h2>Nuevo Registro</h2>
            <input id="reg_email" placeholder="Email">
            <input id="reg_password" type="password" placeholder="Password">
            <button class="btn-alt" onclick="registrar()">Registrarse</button>
        </div>
    </div>

    <!-- Sección de Denuncias (Oculta hasta el login) -->
    <div id="dashboard" style="display:none;">
        <div class="card">
            <h2>Realizar Denuncia</h2>
            <input id="den_nombre" placeholder="Nombre completo">
            <input id="den_ci" placeholder="Cédula de Identidad">
            <textarea id="den_desc" placeholder="Descripción del hecho"></textarea>
            <button onclick="crearDenuncia()">Enviar Denuncia</button>
        </div>

        <div class="card table-card">
            <h2>Denuncias Registradas</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Nombre</th><th>CI</th><th>Descripción</th></tr>
                    </thead>
                    <tbody id="cuerpo_tabla"></tbody>
                </table>
            </div>
        </div>
    </div>

    <p id="msg" class="error-msg"></p>
</div>

<script src="app.js"></script>
</body>
</html>
