<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <img src="denuncia.png" class="logo-img">
            <h1>DISTRITO POLICIAL N° 8<br><small>SISTEMA JUDICIAL</small></h1>
        </header>

        <!-- LOGIN -->
        <div id="auth-section" class="card">
            <h2>Acceso de Oficiales</h2>
            <input id="login_email" type="email" placeholder="Correo">
            <input id="login_password" type="password" placeholder="Contraseña">
            <button class="btn-blue" onclick="login()">INGRESAR</button>
            <hr>
            <input id="reg_email" placeholder="Solicitar Nuevo Correo">
            <input id="reg_password" type="password" placeholder="Nueva Clave">
            <button class="btn-gray" onclick="registrar()">REGISTRAR OFICIAL</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" style="display:none;">
            <div class="user-info">
                <span id="user-display"></span> | <span id="rol-display" class="badge"></span>
            </div>

            <!-- VISTA PENDIENTE -->
            <div id="view-pendiente" style="display:none;" class="card warning">
                <h3>⚠️ ACCESO PENDIENTE</h3>
                <p>El Administrador debe autorizar su cargo.</p>
            </div>

            <!-- VISTA ADMIN -->
            <div id="view-admin" style="display:none;" class="card">
                <h3>Aprobación de Personal</h3>
                <table>
                    <thead><tr><th>Oficial</th><th>Cargo</th><th>Acción</th></tr></thead>
                    <tbody id="lista-admin"></tbody>
                </table>
            </div>

            <!-- VISTA POLICIA -->
            <div id="view-policia" style="display:none;" class="card">
                <h3>Registro de Denuncia</h3>
                <input id="den_nombre" placeholder="Nombre Sujeto">
                <input id="den_ci" placeholder="C.I.">
                <textarea id="den_desc" placeholder="Relato de los hechos..."></textarea>
                <button class="btn-blue" onclick="procesarDenuncia()">GUARDAR Y PDF</button>
            </div>

            <!-- VISTA FISCAL -->
            <div id="view-fiscal" style="display:none;" class="card">
                <h3>Bandeja de Casos</h3>
                <table>
                    <thead><tr><th>Sujeto</th><th>CI</th><th>Gestión</th></tr></thead>
                    <tbody id="lista-fiscal"></tbody>
                </table>
            </div>

            <button class="btn-red" onclick="location.reload()">CERRAR SISTEMA</button>
        </div>
    </div>

    <!-- MODAL CITACION -->
    <div id="modal-citacion" class="modal">
        <div class="modal-content card">
            <h3>ORDEN DE CITACIÓN</h3>
            <input type="hidden" id="modal_id">
            <input id="modal_nombre" readonly>
            <select id="modal_nivel">
                <option value="1ra Citación">1ra CITACIÓN</option>
                <option value="2da Citación">2da CITACIÓN</option>
                <option value="3ra Citación (Ultimátum)">3ra CITACIÓN</option>
            </select>
            <input type="datetime-local" id="modal_fecha">
            <input id="modal_fiscal" placeholder="Nombre Fiscal">
            <button onclick="procesarCitacion()" class="btn-green">GENERAR CITACIÓN</button>
            <button onclick="cerrarModal()" class="btn-gray">CANCELAR</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
