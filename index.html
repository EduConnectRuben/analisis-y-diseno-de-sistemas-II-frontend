<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PD8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Sistema PD8</h1>

    <!-- SECCIÓN DE LOGIN Y REGISTRO -->
    <div id="auth-section">
        <div class="card">
            <h2>Ingresar</h2>
            <input id="login_email" placeholder="Email">
            <input id="login_password" type="password" placeholder="Password">
            <button onclick="login()">Ingresar</button>
        </div>

        <div class="card">
            <h2>Registro</h2>
            <input id="reg_email" placeholder="Email">
            <input id="reg_password" type="password" placeholder="Password">
            <button onclick="registrar()" style="background:#444">Registrarse</button>
        </div>
    </div>

    <!-- SECCIÓN DEL DASHBOARD (Se muestra tras el login) -->
    <div id="dashboard-section" style="display:none;">
        <div class="card">
            <h2>Panel de Denuncias</h2>
            <p>Bienvenido al sistema. Use el formulario para denunciar.</p>
            <input id="den_nombre" placeholder="Nombre completo">
            <input id="den_ci" placeholder="CI / Cédula">
            <textarea id="den_desc" placeholder="Descripción de la denuncia" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"></textarea>
            <button onclick="crearDenuncia()">Enviar Denuncia</button>
            <button onclick="cerrarSesion()" style="background:#991b1b; margin-top:10px;">Cerrar Sesión</button>
        </div>

        <div class="card">
            <h2>Lista de Denuncias</h2>
            <table id="tabla-denuncias" style="width:100%; border-collapse:collapse;">
                <thead>
                    <tr style="background:#eee">
                        <th>Nombre</th>
                        <th>CI</th>
                        <th>Descripción</th>
                    </tr>
                </thead>
                <tbody id="lista_denuncias"></tbody>
            </table>
        </div>
    </div>

    <p id="msg" style="text-align:center; color:red;"></p>
</div>

<script src="app.js"></script>
</body>
</html>
