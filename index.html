<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8 PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="pro-container">
        <header class="pro-header">
            <img src="denuncia.png" class="police-logo" onerror="this.style.display='none'">
            <h1>DISTRITO POLICIAL N° 8<br><small>DPTO. DE CONTROL JUDICIAL</small></h1>
        </header>

        <!-- PANTALLA INICIAL: LOGIN Y REGISTRO -->
        <div id="auth-section">
            <div class="card shadow login-card">
                <h2>Acceso de Oficiales</h2>
                <input id="login_email" type="email" placeholder="Correo / Usuario">
                <input id="login_password" type="password" placeholder="Contraseña">
                <button class="btn-main" onclick="login()">INGRESAR</button>
            </div>
            <div class="card shadow register-card">
                <h3>Solicitar Nueva Cuenta</h3>
                <input id="reg_email" placeholder="Email institucional">
                <input id="reg_password" type="password" placeholder="Crear Clave">
                <button class="btn-sec" onclick="registrar()">REGISTRAR OFICIAL</button>
            </div>
        </div>

        <!-- DASHBOARD PRINCIPAL -->
        <div id="dashboard" style="display:none;">
            <div class="user-status">
                <div class="status-left"><span id="user-display"></span></div>
                <div class="status-right"><span id="rol-display" class="badge"></span></div>
            </div>

            <!-- VISTA ADMIN -->
            <div id="view-admin" style="display:none;" class="card shadow">
                <h3>Administración de Personal Policial</h3>
                <table class="pro-table">
                    <thead><tr><th>Oficial</th><th>Cargo</th><th>Acción</th></tr></thead>
                    <tbody id="lista-admin"></tbody>
                </table>
            </div>

            <!-- VISTA POLICIA (SARGENTO) -->
            <div id="view-policia" style="display:none;" class="card shadow">
                <div class="header-blue">NUEVA DENUNCIA CIUDADANA</div>
                <div class="card-body">
                    <input id="den_nombre" placeholder="Nombre completo del sujeto denunciado">
                    <input id="den_ci" placeholder="Cédula de Identidad (CI)">
                    <textarea id="den_desc" placeholder="Descripción detallada de los hechos..."></textarea>
                    <button class="btn-main" onclick="procesarDenuncia()">REGISTRAR CASO Y GENERAR ACTA</button>
                </div>
            </div>

            <!-- VISTA FISCALIA -->
            <div id="view-fiscal" style="display:none;" class="card shadow">
                <div class="header-gold">BANDEJA DE CASOS PENALES</div>
                <table class="pro-table">
                    <thead><tr><th>Sujeto</th><th>CI</th><th>Gestión</th></tr></thead>
                    <tbody id="lista-fiscal"></tbody>
                </table>
            </div>

            <button class="btn-danger logout-btn" onclick="location.reload()">CERRAR SESIÓN SEGURA</button>
        </div>
    </div>

    <!-- MODAL PROFESIONAL -->
    <div id="modal-citacion" class="modal">
        <div class="modal-content card shadow">
            <h3 class="gold-text">EMITIR MANDAMIENTO DE CITACIÓN</h3>
            <input type="hidden" id="modal_id">
            <div class="modal-grid">
                <label>Denunciado:</label>
                <input id="modal_nombre" readonly class="input-flat">
                <label>Tipo de Citación:</label>
                <select id="modal_nivel" class="pro-select">
                    <option value="1ra Citación">1ra CITACIÓN (Preventiva)</option>
                    <option value="2da Citación">2da CITACIÓN (Advertencia)</option>
                    <option value="3ra Citación (Ultimátum)">3ra CITACIÓN (Aprehensión)</option>
                </select>
                <label>Fecha y Hora:</label>
                <input type="datetime-local" id="modal_fecha">
                <label>Fiscal de Turno:</label>
                <input id="modal_fiscal" placeholder="Nombre del Fiscal Asignado">
            </div>
            <div class="modal-footer">
                <button onclick="procesarCitacion()" class="btn-success">GENERAR Y GUARDAR</button>
                <button onclick="cerrarModal()" class="btn-sec">CANCELAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
