<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLICÍA PD-8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-container">
    <header>
        <img src="denuncia.png" width="80" class="main-logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022213.png'">
        <h1>DISTRITO POLICIAL N° 8</h1>
    </header>

    <!-- LOGIN -->
    <div id="auth-section" class="card shadow">
        <h2 style="text-align:center;">Acceso Autorizado</h2>
        <input id="login_email" type="email" placeholder="Correo (admin/policia/fiscal)">
        <input id="login_password" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="login()">INGRESAR</button>
        <hr>
        <p style="font-size:12px; text-align:center;">Registro de nuevo personal:</p>
        <input id="reg_email" placeholder="Nuevo Correo">
        <input id="reg_password" type="password" placeholder="Nueva Clave">
        <button class="btn-secondary" onclick="registrar()">SOLICITAR REGISTRO</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <div class="user-info">
            <span id="user-display"></span>
            <span id="rol-display" class="badge"></span>
        </div>

        <!-- VISTA PENDIENTE -->
        <div id="view-pendiente" style="display:none;" class="card shadow warning">
            <h2>⚠️ ACCESO LIMITADO</h2>
            <p>Espere a que el Administrador autorice su rango de Oficial.</p>
        </div>

        <!-- VISTA ADMIN -->
        <div id="view-admin" style="display:none;" class="card shadow">
            <h2 class="badge red">CONTROL DE PERSONAL</h2>
            <table>
                <thead><tr><th>Email</th><th>Rango</th><th>Asignar</th></tr></thead>
                <tbody id="lista-admin"></tbody>
            </table>
        </div>

        <!-- VISTA POLICIA -->
        <div id="view-policia" style="display:none;" class="card shadow">
            <h2 class="badge blue">REGISTRO DE DENUNCIAS</h2>
            <input id="den_nombre" placeholder="Nombre Sujeto">
            <input id="den_ci" placeholder="C.I.">
            <textarea id="den_desc" placeholder="Relato del hecho delictivo..."></textarea>
            <button class="btn-primary" onclick="crearDenuncia()">GUARDAR Y DESCARGAR PDF</button>
        </div>

        <!-- VISTA FISCAL -->
        <div id="view-fiscal" style="display:none;" class="card shadow">
            <h2 class="badge gold">FISCALÍA: CITACIONES</h2>
            <table>
                <thead><tr><th>Nombre</th><th>CI</th><th>Gestión</th></tr></thead>
                <tbody id="lista-fiscal"></tbody>
            </table>
        </div>

        <button class="btn-danger" style="margin-top:20px;" onclick="location.reload()">CERRAR SESIÓN</button>
    </div>
</div>

<!-- MODAL FISCAL -->
<div id="modal-citacion" class="modal">
    <div class="modal-content card shadow">
        <h3>EMITIR ORDEN DE CITACIÓN</h3>
        <input type="hidden" id="modal_id">
        <input id="modal_nombre" readonly class="readonly">
        <label>Fecha y Hora:</label>
        <input type="datetime-local" id="modal_fecha">
        <input id="modal_fiscal" placeholder="Nombre del Fiscal">
        <button onclick="generarCitacionPDF()" class="btn-success">GENERAR PDF + QR</button>
        <button onclick="cerrarModal()" class="btn-secondary" style="margin-top:10px;">CANCELAR</button>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
