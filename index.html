<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="main-container">
        <header>
            <img src="denuncia.png" width="60" class="logo-circle">
            <h1>DISTRITO POLICIAL N° 8<br><small>GESTIÓN JUDICIAL</small></h1>
        </header>

        <!-- LOGIN -->
        <div id="auth-section" class="card shadow">
            <h2>Acceso Autorizado</h2>
            <input id="login_email" type="email" placeholder="Usuario">
            <input id="login_password" type="password" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">INGRESAR</button>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" style="display:none;">
            <div class="user-bar">
                <span id="user-display"></span> | <span id="rol-display" class="badge"></span>
            </div>

            <!-- VISTA PENDIENTE -->
            <div id="view-pendiente" style="display:none;" class="card shadow warning">
                <h3>⚠️ CUENTA EN ESPERA</h3>
                <p>El Administrador debe asignar su cargo (Policía o Fiscal).</p>
            </div>

            <!-- VISTA ADMIN -->
            <div id="view-admin" style="display:none;" class="card shadow">
                <h3>Control de Personal</h3>
                <table id="table-admin">
                    <thead><tr><th>Oficial</th><th>Cargo</th><th>Acción</th></tr></thead>
                    <tbody id="lista-admin"></tbody>
                </table>
            </div>

            <!-- VISTA POLICIA -->
            <div id="view-policia" style="display:none;" class="card shadow">
                <h3>Nuevo Registro de Denuncia</h3>
                <input id="den_nombre" placeholder="Nombre completo del denunciado">
                <input id="den_ci" placeholder="C.I.">
                <textarea id="den_desc" placeholder="Relato detallado de los hechos..."></textarea>
                <button class="btn-primary" onclick="guardarDenuncia()">GUARDAR DENUNCIA Y GENERAR PDF</button>
            </div>

            <!-- VISTA FISCALIA -->
            <div id="view-fiscal" style="display:none;" class="card shadow">
                <h3>Casos para Citación Fiscal</h3>
                <table>
                    <thead><tr><th>Sujeto</th><th>CI</th><th>Acción</th></tr></thead>
                    <tbody id="lista-fiscal"></tbody>
                </table>
            </div>

            <button class="btn-danger" style="margin-top:20px;" onclick="location.reload()">SALIR DEL SISTEMA</button>
        </div>
    </div>

    <!-- MODAL CITACION -->
    <div id="modal-citacion" class="modal">
        <div class="modal-content card">
            <h3>ORDEN DE COMPARECENCIA</h3>
            <input type="hidden" id="modal_id">
            <label>Sujeto:</label>
            <input id="modal_nombre" readonly>
            <label>Nivel de Citación:</label>
            <select id="modal_num">
                <option value="PRIMERA">PRIMERA CITACIÓN</option>
                <option value="SEGUNDA">SEGUNDA CITACIÓN</option>
                <option value="TERCERA (ULTIMATUM)">TERCERA CITACIÓN - ULTIMATUM</option>
            </select>
            <label>Fecha y Hora:</label>
            <input type="datetime-local" id="modal_fecha">
            <label>Fiscal de Turno:</label>
            <input id="modal_fiscal" placeholder="Nombre completo">
            <button onclick="generarPDFCitacion()" class="btn-success">GENERAR PDF LEGAL</button>
            <button onclick="cerrarModal()" class="btn-secondary" style="margin-top:5px;">CANCELAR</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
