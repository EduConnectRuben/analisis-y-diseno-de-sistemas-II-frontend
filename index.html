<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8 - BOLIVIA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-container">
    <header>
        <img src="denuncia.png" width="80" class="logo">
        <h1>POLICÍA NACIONAL DE BOLIVIA<br><small>SISTEMA PD-8</small></h1>
    </header>

    <!-- PANTALLA INICIAL: LOGIN / REGISTRO -->
    <div id="auth-section" class="card shadow">
        <h2>Acceso al Sistema</h2>
        <input id="login_email" type="email" placeholder="Correo Institucional">
        <input id="login_password" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="login()">INGRESAR</button>
        <hr>
        <p style="text-align:center; font-size:12px;">Solicitar nueva cuenta oficial:</p>
        <input id="reg_email" placeholder="Email">
        <input id="reg_password" type="password" placeholder="Clave">
        <button class="btn-secondary" onclick="registrar()">REGISTRAR OFICIAL</button>
    </div>

    <!-- CONTENEDOR PRINCIPAL POST-LOGIN -->
    <div id="dashboard" style="display:none;">
        
        <!-- SECCION ADMIN -->
        <div id="view-admin" style="display:none;" class="card shadow">
            <h2 class="badge red">PANEL DE ADMINISTRACIÓN</h2>
            <h3>Lista de Solicitudes de Personal</h3>
            <button onclick="cargarAdmin()" class="btn-sm blue">Actualizar Lista</button>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Email Oficial</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="lista-admin"></tbody>
                </table>
            </div>
        </div>

        <!-- SECCION POLICIA -->
        <div id="view-policia" style="display:none;" class="card shadow">
            <h2 class="badge blue">MÓDULO SARGENTO: DENUNCIAS</h2>
            <input id="den_nombre" placeholder="Nombre Denunciado">
            <input id="den_ci" placeholder="C.I.">
            <textarea id="den_desc" placeholder="Relato de hechos..."></textarea>
            <button class="btn-primary" onclick="crearDenuncia()">GUARDAR Y DESCARGAR PDF</button>
        </div>

        <!-- SECCION FISCALIA -->
        <div id="view-fiscal" style="display:none;" class="card shadow">
            <h2 class="badge gold">MÓDULO FISCALÍA: CITACIONES</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr><th>Sujeto</th><th>CI</th><th>Gestión</th></tr>
                    </thead>
                    <tbody id="lista-fiscal"></tbody>
                </table>
            </div>
        </div>

        <button class="btn-danger" style="margin-top:20px;" onclick="location.reload()">CERRAR SISTEMA</button>
    </div>
</div>

<!-- MODAL PARA CITACIONES -->
<div id="modal-citacion" class="modal">
    <div class="modal-content card shadow">
        <h3>EMITIR CITACIÓN</h3>
        <input type="hidden" id="modal_id">
        <input id="modal_nombre" readonly class="readonly">
        <input type="datetime-local" id="modal_fecha">
        <input id="modal_fiscal" placeholder="Nombre del Fiscal">
        <div class="modal-buttons">
            <button onclick="generarCitacionPDF()" class="btn-success">GENERAR PDF</button>
            <button onclick="cerrarModal()" class="btn-secondary">CANCELAR</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
