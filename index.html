<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="main-container">
        <header>
            <img src="denuncia.png" width="70" onerror="this.style.display='none'">
            <h1>DISTRITO POLICIAL N° 8</h1>
        </header>

        <div id="auth-section" class="card shadow">
            <h2>Ingreso de Oficiales</h2>
            <input id="login_email" type="email" placeholder="Correo">
            <input id="login_password" type="password" placeholder="Contraseña">
            <button class="btn-primary" onclick="login()">INGRESAR</button>
            <hr>
            <input id="reg_email" placeholder="Nuevo Correo">
            <input id="reg_password" type="password" placeholder="Nueva Clave">
            <button class="btn-secondary" onclick="registrar()">SOLICITAR REGISTRO</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="user-info">
                <span id="user-display"></span> | <span id="rol-display" class="badge"></span>
            </div>

            <div id="view-pendiente" style="display:none;" class="card shadow warning">
                <h2>Acceso Limitado</h2>
                <p>Su cuenta no tiene cargo. Espere al Administrador.</p>
            </div>

            <div id="view-admin" style="display:none;" class="card shadow">
                <h2 class="badge red">ADMINISTRACIÓN</h2>
                <table>
                    <thead><tr><th>Email</th><th>Rango</th><th>Asignar</th></tr></thead>
                    <tbody id="lista-admin"></tbody>
                </table>
            </div>

            <div id="view-policia" style="display:none;" class="card shadow">
                <h2 class="badge blue">DENUNCIAS</h2>
                <input id="den_nombre" placeholder="Nombre Sujeto">
                <input id="den_ci" placeholder="CI">
                <textarea id="den_desc" placeholder="Hechos"></textarea>
                <button class="btn-primary" onclick="crearDenuncia()">GUARDAR Y PDF</button>
            </div>

            <div id="view-fiscal" style="display:none;" class="card shadow">
                <h2 class="badge gold">FISCALÍA</h2>
                <table>
                    <thead><tr><th>Nombre</th><th>CI</th><th>Gestión</th></tr></thead>
                    <tbody id="lista-fiscal"></tbody>
                </table>
            </div>
            <button class="btn-danger" style="margin-top:20px;" onclick="location.reload()">CERRAR SESIÓN</button>
        </div>
    </div>

    <div id="modal-citacion" class="modal">
        <div class="modal-content card shadow">
            <h3>CITACIÓN FISCAL</h3>
            <input type="hidden" id="modal_id">
            <input id="modal_nombre" readonly>
            <input type="datetime-local" id="modal_fecha">
            <input id="modal_fiscal" placeholder="Nombre Fiscal">
            <button onclick="generarCitacionPDF()" class="btn-success">GENERAR PDF</button>
            <button onclick="cerrarModal()" class="btn-secondary" style="margin-top:10px;">CANCELAR</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
