<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PD8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Sistema PD8</h1>
        
        <div id="auth-section">
            <div class="card">
                <h2>Login</h2>
                <input id="login_email" placeholder="Email">
                <input id="login_password" type="password" placeholder="Password">
                <button onclick="login()">Ingresar</button>
            </div>

            <div class="card">
                <h2>Registro</h2>
                <input id="reg_email" placeholder="Email">
                <input id="reg_password" type="password" placeholder="Password">
                <button onclick="registrar()" style="background:#444">Registrarse</button>
            </div>
        </div>

        <div id="dashboard" style="display:none" class="card">
            <h2>Bienvenido al Sistema</h2>
            <p>Has iniciado sesión correctamente.</p>
        </div>

        <p id="msg" style="color:red; text-align:center;"></p>
    </div>
    <script src="app.js"></script>
</body>
</html>
