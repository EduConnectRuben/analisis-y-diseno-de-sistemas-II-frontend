<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8 - BOLIVIA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-container">
    <header>
        <div class="header-content">
            <img id="escudo" src="denuncia.png" alt="Escudo" width="60">
            <h1>DISTRITO POLICIAL N° 8<br><small>SISTEMA DE CONTROL DE DENUNCIAS</small></h1>
        </div>
    </header>

    <!-- ÁREA DE ACCESO -->
    <div id="auth-section">
        <div class="card login-card">
            <h2>Identificación de Oficial</h2>
            <input id="login_email" type="email" placeholder="Usuario / Correo">
            <input id="login_password" type="password" placeholder="Contraseña">
            <button onclick="login()">Acceder al Sistema</button>
            <hr>
            <p style="font-size:12px; text-align:center; margin-top:10px;">Registro de nuevos funcionarios:</p>
            <input id="reg_email" type="email" placeholder="Nuevo Correo">
            <input id="reg_password" type="password" placeholder="Nueva Contraseña">
            <button onclick="registrar()" class="btn-secondary">Registrar Oficial</button>
        </div>
    </div>

    <!-- SISTEMA SEGÚN RANGO -->
    <div id="dashboard" style="display:none;">
        
        <!-- MÓDULO SARGENTO: REGISTRO -->
        <div class="card module">
            <div class="module-header">
                <span class="badge blue">MÓDULO DE SARGENTO</span>
                <h2>Registro de Nueva Denuncia</h2>
            </div>
            <div class="form-group">
                <input id="den_nombre" placeholder="Nombre completo del Denunciado/Sujeto">
                <input id="den_ci" placeholder="Cédula de Identidad (CI)">
                <textarea id="den_desc" placeholder="Relato detallado de los hechos delictivos..."></textarea>
                <button onclick="crearDenuncia()" style="background:#0f172a">Registrar y Generar Acta PDF</button>
            </div>
        </div>

        <!-- MÓDULO FISCALÍA: GESTIÓN -->
        <div class="card module">
            <div class="module-header">
                <span class="badge gold">MÓDULO DE FISCALÍA</span>
                <h2>Gestión Jurídica de Casos</h2>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Sujeto</th>
                            <th>CI</th>
                            <th>Acciones Legales</th>
                        </tr>
                    </thead>
                    <tbody id="tabla_denuncias"></tbody>
                </table>
            </div>
        </div>
        
        <button onclick="location.reload()" class="btn-danger">Cerrar Sesión Segura</button>
    </div>
</div>

<!-- MODAL PARA CITACIÓN FISCAL -->
<div id="modal-citacion" class="modal">
    <div class="modal-content card">
        <h3>EMITIR ORDEN DE CITACIÓN</h3>
        <hr>
        <input type="hidden" id="modal_id">
        <label>Denunciado:</label>
        <input id="modal_nombre" readonly class="readonly-input">
        <label>Fecha y Hora de Comparecencia:</label>
        <input type="datetime-local" id="modal_fecha">
        <label>Fiscal a cargo del caso:</label>
        <input type="text" id="modal_fiscal" placeholder="Nombre completo">
        <div class="modal-buttons">
            <button onclick="guardarCitacion()" style="background:#059669">Generar Citación PDF</button>
            <button onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
