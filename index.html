<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8 - BOLIVIA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-container">
    <header>
        <img src="denuncia.png" width="80" class="logo">
        <h1>SISTEMA POLICIAL PD-8</h1>
    </header>

    <!-- PANTALLA DE LOGIN -->
    <div id="auth-section" class="card shadow">
        <h2>Ingreso de Personal</h2>
        <input id="login_email" type="email" placeholder="Correo Oficial">
        <input id="login_password" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="login()">Entrar</button>
        <hr>
        <p style="font-size:12px; text-align:center;">¿Nuevo oficial? Solicite cuenta:</p>
        <input id="reg_email" placeholder="Correo">
        <input id="reg_password" type="password" placeholder="Clave">
        <button class="btn-secondary" onclick="registrar()">Solicitar Acceso</button>
    </div>

    <!-- PANEL ADMIN -->
    <div id="view-admin" style="display:none;" class="card shadow">
        <h2 class="badge red">MODO ADMINISTRADOR</h2>
        <p>Aprobar y asignar cargos a oficiales:</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Rango Actual</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="lista-admin"></tbody>
            </table>
        </div>
    </div>

    <!-- PANEL POLICÍA -->
    <div id="view-policia" style="display:none;" class="card shadow">
        <h2 class="badge blue">MÓDULO SARGENTO: REGISTRO</h2>
        <input id="den_nombre" placeholder="Nombre Sujeto">
        <input id="den_ci" placeholder="C.I.">
        <textarea id="den_desc" placeholder="Relato del hecho delictivo"></textarea>
        <button class="btn-primary" onclick="crearDenuncia()">Registrar Caso y Descargar PDF</button>
    </div>

    <!-- PANEL FISCALÍA -->
    <div id="view-fiscal" style="display:none;" class="card shadow">
        <h2 class="badge gold">MÓDULO FISCALÍA: CITACIONES</h2>
        <div class="table-container">
            <table>
                <thead><tr><th>Nombre</th><th>CI</th><th>Gestión</th></tr></thead>
                <tbody id="lista-fiscal"></tbody>
            </table>
        </div>
    </div>

    <button id="btn-logout" class="btn-danger" style="display:none; margin-top:20px;" onclick="location.reload()">Cerrar Sistema</button>
</div>

<!-- MODAL CITACION -->
<div id="modal-citacion" class="modal">
    <div class="modal-content card shadow">
        <h3>Emitir Citación</h3>
        <input type="hidden" id="modal_id">
        <input id="modal_nombre" readonly class="readonly">
        <input type="datetime-local" id="modal_fecha">
        <input id="modal_fiscal" placeholder="Nombre del Fiscal">
        <div class="modal-footer">
            <button onclick="generarCitacionPDF()" class="btn-success">Generar PDF</button>
            <button onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
