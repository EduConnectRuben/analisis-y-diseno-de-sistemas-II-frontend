<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema PD8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-wrapper">
    <h1>Sistema de Denuncias PD8</h1>

    <!-- LOGIN Y REGISTRO -->
    <div id="auth-section" class="grid-layout">
        <div class="card">
            <h2>Ingresar</h2>
            <input id="login_email" type="email" placeholder="Correo electrónico">
            <input id="login_password" type="password" placeholder="Contraseña">
            <button onclick="login()">Entrar al Sistema</button>
        </div>

        <div class="card">
            <h2>Crear Cuenta</h2>
            <input id="reg_email" type="email" placeholder="Correo electrónico">
            <input id="reg_password" type="password" placeholder="Contraseña">
            <button onclick="registrar()" class="btn-secondary">Registrarse</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-section" style="display:none;">
        <div class="card">
            <h2>Registrar Nueva Denuncia</h2>
            <input id="den_nombre" placeholder="Nombre del denunciante">
            <input id="den_ci" placeholder="Cédula de Identidad (CI)">
            <textarea id="den_desc" placeholder="Detalles de la denuncia..."></textarea>
            <button onclick="crearDenuncia()">Enviar Denuncia</button>
            <button onclick="cerrarSesion()" class="btn-danger">Cerrar Sesión</button>
        </div>

        <div class="card overflow-x">
            <h2>Historial de Denuncias</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>CI</th>
                        <th>Descripción</th>
                    </tr>
                </thead>
                <tbody id="lista_denuncias"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
