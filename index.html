<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PD-8</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="main-container">
    <header>
        <img src="denuncia.png" width="80" onerror="this.src='https://cdn-icons-png.flaticon.com/512/1022/1022213.png'">
        <h1>SISTEMA DE GESTIÓN POLICIAL PD-8</h1>
    </header>

    <!-- LOGIN -->
    <div id="auth-section" class="card shadow">
        <h2>Identificación de Oficial</h2>
        <input id="login_email" type="email" placeholder="Correo">
        <input id="login_password" type="password" placeholder="Contraseña">
        <button class="btn-primary" onclick="login()">Ingresar</button>
        <hr>
        <p style="font-size:12px; text-align:center;">Solicitar nueva cuenta:</p>
        <input id="reg_email" placeholder="Nuevo Correo">
        <input id="reg_password" type="password" placeholder="Nueva Clave">
        <button class="btn-secondary" onclick="registrar()">Registrar Oficial</button>
    </div>

    <!-- PANEL ADMINISTRADOR -->
    <div id="view-admin" style="display:none;" class="card shadow">
        <h2 class="badge red">MODO ADMINISTRADOR</h2>
        <p>Usuarios esperando asignación de cargo:</p>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Usuario</th>
                        <th>Rango</th>
                        <th>Asignar</th>
                    </tr>
                </thead>
                <tbody id="lista-admin"></tbody>
            </table>
        </div>
    </div>

    <!-- PANEL POLICÍA -->
    <div id="view-policia" style="display:none;" class="card shadow">
        <h2 class="badge blue">SARGENTO: REGISTRO DE DENUNCIA</h2>
        <input id="den_nombre" placeholder="Nombre Sujeto">
        <input id="den_ci" placeholder="C.I.">
        <textarea id="den_desc" placeholder="Relato del hecho"></textarea>
        <button class="btn-primary" onclick="crearDenuncia()">Guardar Denuncia y PDF</button>
    </div>

    <!-- PANEL FISCALÍA -->
    <div id="view-fiscal" style="display:none;" class="card shadow">
        <h2 class="badge gold">FISCALÍA: CITACIONES</h2>
        <table>
            <thead><tr><th>Sujeto</th><th>CI</th><th>Acción</th></tr></thead>
            <tbody id="lista-fiscal"></tbody>
        </table>
    </div>

    <button id="btn-logout" class="btn-danger" style="display:none; margin-top:20px;" onclick="location.reload()">Cerrar Sistema</button>
</div>

<!-- MODAL CITACION -->
<div id="modal-citacion" class="modal">
    <div class="modal-content card shadow">
        <h3>Emitir Citación</h3>
        <input type="hidden" id="modal_id">
        <input id="modal_nombre" readonly class="readonly">
        <input type="datetime-local" id="modal_fecha">
        <input id="modal_fiscal" placeholder="Nombre Fiscal">
        <div class="modal-footer">
            <button onclick="generarCitacionPDF()" style="background:green">Confirmar</button>
            <button onclick="cerrarModal()" class="btn-secondary">Cancelar</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
